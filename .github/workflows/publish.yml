# Triggered when a release branch is merged into main.
# Builds a self-contained Windows installer with Velopack and creates a GitHub Release.
# After publishing, automatically opens a merge-back PR: main → develop.
name: Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    name: Build & Publish Installer
    runs-on: windows-2022
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $v = (Get-Content version.json | ConvertFrom-Json).version
          echo "version=$v" >> $env:GITHUB_OUTPUT
          echo "tag=v$v" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore

      - name: Build & Test
        run: |
          dotnet build --no-restore --configuration Release -warnaserror
          dotnet test  --no-build  --configuration Release

      - name: Publish (self-contained win-x64)
        run: >
          dotnet publish src/JoystickGremlin.App/JoystickGremlin.App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output publish/

      - name: Install Velopack CLI
        run: dotnet tool install --global vpk

      - name: Pack installer
        shell: pwsh
        run: |
          vpk pack `
            --packId   JoystickGremlinSharp `
            --packVersion "${{ steps.version.outputs.version }}" `
            --packDir  publish/ `
            --mainExe  JoystickGremlin.App.exe `
            --outputDir installer/out/

      - name: Rename installer to include version
        shell: pwsh
        run: |
          $setup = Get-Item "installer/out/JoystickGremlinSharp-Setup.exe"
          $target = "installer/out/JoystickGremlinSharp-${{ steps.version.outputs.version }}-Setup.exe"
          Move-Item $setup.FullName $target
          Write-Host "Renamed installer: $($setup.Name) → $(Split-Path $target -Leaf)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Joystick Gremlin ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: installer/out/*-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open merge-back PR main → develop
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh pr create \
            --base develop \
            --head main \
            --title "chore: merge-back ${{ steps.version.outputs.tag }} to develop" \
            --body "Automated merge-back from \`main\` to \`develop\` after publishing release ${{ steps.version.outputs.tag }}."
